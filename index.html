
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINTECH | Finance SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Estilos de Impressão Ultra-Resistentes */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            aside, header, footer, .no-print, button, select {
                display: none !important;
            }
            #root, body, html {
                background: white !important;
                color: black !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }
            main {
                margin-left: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                display: block !important;
                position: static !important;
            }
            .print-only {
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 20mm !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                z-index: 9999 !important;
            }
            .chart-container {
                page-break-inside: avoid;
                width: 100% !important;
                height: 400px !important;
            }
            h1, h2, h3, p, span {
                color: black !important;
            }
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideLeft {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slideLeft { animation: slideLeft 0.3s ease-out forwards; }
        .animate-slideDown { animation: slideDown 0.3s ease-out forwards; }
        .animate-scaleIn { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
